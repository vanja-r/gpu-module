# This rule is not used by the project gpu-module itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over cloud-control.gpu.kyma-project.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-module
    app.kubernetes.io/managed-by: kustomize
  name: cloud-control.gpu-gpucluster-admin-role
rules:
- apiGroups:
  - cloud-control.gpu.kyma-project.io
  resources:
  - gpuclusters
  verbs:
  - '*'
- apiGroups:
  - cloud-control.gpu.kyma-project.io
  resources:
  - gpuclusters/status
  verbs:
  - get
