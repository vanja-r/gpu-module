# This rule is not used by the project gpu-module itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to cloud-control.gpu.kyma-project.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-module
    app.kubernetes.io/managed-by: kustomize
  name: cloud-control.gpu-gpucluster-viewer-role
rules:
- apiGroups:
  - cloud-control.gpu.kyma-project.io
  resources:
  - gpuclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cloud-control.gpu.kyma-project.io
  resources:
  - gpuclusters/status
  verbs:
  - get
